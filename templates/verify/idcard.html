{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Print</title>
    <style>
        @font-face {
            font-family: 'Arimo';
            src: url('{% static "fonts/Arimo-Regular.ttf" %}') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        /* Regular */
        @font-face {
            font-family: 'Arimo';
            src: url('{% static "fonts/Arimo-Bold.ttf" %}') format('truetype');
            font-weight: 600;
            font-style: bold;
        }
        body {
            margin: 0;
            font-family: 'Arimo', sans-serif;
            padding: 0;
            text-align: center;
            color: #101010c7;
        }
        .print-container {
            position: relative;
            width: 297mm;
            height: 210mm;
            margin: 20px auto;
        }
    </style>
</head>

<body>
    <div class="print-container" id="certificate">
        <img src="{% static 'img/student-card.jpeg'%}" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:-1;">
        <p style="position: absolute;left: 214px; top: 106px;font-size: 16px;font-weight: 600;font-family: 'Arimo';">{{course.name}}</p>
        <p style="position: absolute;left: 214px;top: 129px;font-size: 16px;font-weight: 600;font-family: 'Arimo';">{{institution.branch_code}}</p>
        <img src="{% static 'img/bti_logo.png'%}" style="width: 80px;position: absolute;top: 112px;left: 800px;" alt="">
        <img src="{{student.profile.profile_image.url}}" alt="" style="width: 176px;height: 186px;position: absolute;top: 188px;left: 221px;">
        <p style="position: absolute;left: 272px;top: 451px;font-weight: 600;">{{ student.roll_no}}</p>
        <p style="position: absolute;left: 272px;top: 485px;font-weight: 600;">{{ student.reg_no}}</p>
        <p style="position: absolute;left: 272px;top: 519px;font-weight: 600;">{{student.father_name}}</p>
        <p style="position: absolute;left: 272px;top: 552px;font-weight: 600;">{{course.get_custom_duration}}</p>
        <p style="position: absolute;left: 272px;top: 586px;font-weight: 600;">{{student.mobile}}</p>
        <p style="position: absolute;left: 812px;top: 389px;font-weight: 600;color: #f53232;"><b>{{course.created_at|date:"d M Y" }}</b></p>
        <p style="position: absolute;left: 812px;top: 413px;font-weight: 600;color: #f53232;"><b>{{course.expiry_date|date:"d M Y" }}</b></p>

    </div>
</body>
</html>
