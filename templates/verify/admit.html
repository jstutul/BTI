{% load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admit Print</title>
    <style>
        @font-face {
            font-family: 'LibertinusSerif';
            src: url('{% static "fonts/LibertinusSerif-Regular.ttf"%}') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
         @font-face {
            font-family: 'LibertinusSerif-Bold';
            src: url('{% static "fonts/LibertinusSerif-Bold.ttf"%}') format('truetype');
            font-weight: 600;
            font-style: bold;
        }
        body {
            margin: 0;
            font-family: 'LibertinusSerif', sans-serif;
            padding: 0;
            overflow: hidden;
            color: #4f4f4f;
        }
        .print-container {
            position: relative;
            width: 297mm;
            height: 210mm;
            margin: 0 auto; /* Remove top/bottom margins so they don't appear in PDF */
            overflow: hidden; /* Ensures no bleed over */
        }
       
    </style>
</head>

<body>
    <div class="print-container">
        <img src="{{chairman.admitcard_bg.url}}" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:-1;">
        <p style="position: absolute;top: 288px;font-family: 'LibertinusSerif';left: 209px;font-weight: 600;font-size: 16px;">:&nbsp;&nbsp;{{cert.serial_no}}</p>
        <p style="position: absolute;top: 334px;font-family: 'LibertinusSerif';left: 926px;font-weight: 600;font-size: 16px;">{{student.reg_no}}</p>
        <p style="position: absolute;top: 376px;font-family: 'LibertinusSerif';left: 935px;font-weight: 600;font-size: 16px;">{{student.roll_no}}</p>
        <p style="position: absolute;top: 338px;font-family: 'LibertinusSerif';left: 325px;font-weight: 600;font-size: 16px;">{{institution.name}}</p>
        <p style="position: absolute;top: 366px;font-family: 'LibertinusSerif';left: 325px;font-weight: 600;font-size: 16px;">{{student.full_name}}</p>
        <p style="position: absolute;top: 395px;font-family: 'LibertinusSerif';left: 325px;font-weight: 600;font-size: 16px;">{{student.father_name}}</p>
        <p style="position: absolute;top: 423px;font-family: 'LibertinusSerif';left: 325px;font-weight: 600;font-size: 16px;">{{student.mother_name}}</p>
        <p style="position: absolute;top: 453px;font-family: 'LibertinusSerif';left: 325px;font-weight: 600;font-size: 16px;">{{student.dob}}</p>
        <p style="position: absolute;top: 480px;font-family: 'LibertinusSerif';left: 325px;font-weight: 600;font-size: 16px;">{{session.name}}</p>
        <p style="position: absolute;top: 529px;font-family: 'LibertinusSerif';left: 325px;font-weight: 600;font-size: 16px;">{{course.name}}</p>
        <p style="position: absolute;top: 463px;font-family: 'LibertinusSerif';left: 970px;font-weight: 600;">{{student.gender}}</p>
        <p style="position: absolute;top: 510px;font-family: 'LibertinusSerif';left: 970px;font-weight: 600;font-size: 16px;">{{course.cert_type}}</p>
    </div>

   
</body>
</html>
