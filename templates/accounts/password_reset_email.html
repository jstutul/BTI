<div style="font-family:Arial;padding:20px;">
    <h2 style="color:#d32f2f;">🔐 Password Reset</h2>

    <p>Hello {{ user.get_username }},</p>

    <p>You requested to reset your password.</p>

    <p>
        <a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}"
           style="background:#d32f2f;color:#fff;padding:10px 20px;text-decoration:none;border-radius:5px;">
           Reset Password
        </a>
    </p>

    <p>If you did not request this, ignore this email.</p>

    <hr>
    <small>{{ SITE_NAME }}</small>
</div>
